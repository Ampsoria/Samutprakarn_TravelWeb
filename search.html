<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <title>ค้นหาสถานที่ | Samut Prakan Travel</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .search-layout {
            display: flex;
            gap: var(--spacing-4);
            align-items: flex-start;
        }

        /* Filter Sidebar */
        .filter-sidebar {
            width: 250px;
            background: white;
            border-radius: var(--radius-md);
            padding: var(--spacing-3);
            border: 1px solid var(--border-color);
            position: sticky;
            top: 80px;
        }

        .filter-group {
            margin-bottom: var(--spacing-3);
        }

        .filter-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--spacing-2);
            color: var(--text-dark);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-1);
            margin-bottom: var(--spacing-1);
            cursor: pointer;
        }

        .checkbox-group input {
            cursor: pointer;
        }

        .results-container {
            flex: 1;
        }

        /* Result Cards */
        .result-card {
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: white;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .result-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .result-body {
            padding: var(--spacing-2);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .price-tag {
            margin-top: auto;
            color: var(--primary-orange);
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .search-layout {
                flex-direction: column;
            }

            .filter-sidebar {
                width: 100%;
                position: static;
            }
        }
    </style>
</head>

<body class="user-layout">

    <!-- Top Navbar -->
    <nav class="top-nav">
        <div class="flex items-center gap-3">
            <a href="home.html" class="btn btn-outline" style="border-radius:50%; padding:8px; display:flex;">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <h1 class="h3" style="margin:0;" data-i18n="search_title">ค้นหา</h1>
        </div>

        <div class="nav-actions flex items-center gap-3">
            <div class="search-bar" style="width: 300px;">
                <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="searchInputField" data-i18n="search_placeholder" placeholder="หาอะไรอยู่เอ่ย..."
                    class="ml-2">
            </div>

            <div class="lang-switch" style="margin:0;">
                <button class="lang-btn active" data-lang="th">TH</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="app-container" style="padding: var(--spacing-4);">

        <div class="flex justify-between items-center mb-3">
            <h2 class="h3" data-i18n="search_found">พบ 24 สถานที่</h2>
            <div class="text-small text-muted" data-i18n="search_sort">เรียงตาม: <strong
                    style="color:var(--text-dark);">ยอดนิยม</strong></div>
        </div>

        <div class="search-layout">
            <!-- Filter Sidebar -->
            <aside class="filter-sidebar">
                <div class="filter-group">
                    <div class="filter-title" data-i18n="filter_category">หมวดหมู่</div>
                    <label class="checkbox-group"><input type="checkbox" class="cat-filter" value="nature" checked>
                        <span>ธรรมชาติ</span></label>
                    <label class="checkbox-group"><input type="checkbox" class="cat-filter" value="temple">
                        <span>วัด/สถานที่ศักดิ์สิทธิ์</span></label>
                    <label class="checkbox-group"><input type="checkbox" class="cat-filter" value="cafe">
                        <span>คาเฟ่/ร้านอาหาร</span></label>
                    <label class="checkbox-group"><input type="checkbox" class="cat-filter" value="history">
                        <span>ประวัติศาสตร์</span></label>
                    <label class="checkbox-group"><input type="checkbox" class="cat-filter" value="art">
                        <span>ศิลปวัฒนธรรม</span></label>
                </div>

                <div class="filter-group">
                    <div class="filter-title" data-i18n="filter_amphoe">อำเภอ</div>
                    <label class="checkbox-group"><input type="checkbox" checked> <span>เมือง (18)</span></label>
                    <label class="checkbox-group"><input type="checkbox"> <span>บางพลี (5)</span></label>
                    <label class="checkbox-group"><input type="checkbox"> <span>พระประแดง (22)</span></label>
                    <label class="checkbox-group"><input type="checkbox"> <span>บางบ่อ (2)</span></label>
                </div>

                <div class="filter-group" style="margin-bottom:0;">
                    <button class="btn btn-primary btn-full" data-i18n="filter_apply">ใช้การตั้งค่า</button>
                    <button class="btn btn-full" style="color:var(--text-muted); margin-top:8px;"
                        data-i18n="filter_clear">ล้างตัวกรอง</button>
                </div>
            </aside>

            <!-- Results -->
            <div class="results-container">
                <div class="grid-cols-3" id="searchResultsGrid">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="bottom-nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                </path>
            </svg>
            <span data-i18n="nav_home">หน้าแรก</span>
        </a>
        <a href="search.html" class="bottom-nav-item active">
            <svg fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <span data-i18n="nav_search">ค้นหา</span>
        </a>
        <a href="stats.html" class="bottom-nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 8v8m-4-5v5m-4-2v2m-2 4h12c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2z">
                </path>
            </svg>
            <span data-i18n="nav_stats">สถิติ</span>
        </a>
        <a href="profile.html" class="bottom-nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span data-i18n="nav_profile">โปรไฟล์</span>
        </a>
    </nav>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
