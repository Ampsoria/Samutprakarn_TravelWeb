<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบรีวิว | Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .review-admin-card {
            background: white;
            padding: var(--spacing-3);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            margin-bottom: var(--spacing-2);
            display: flex;
            gap: var(--spacing-3);
        }

        .review-admin-info {
            flex: 1;
        }

        .review-status {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 8px;
        }

        .status-pending {
            background: #FEF3C7;
            color: #D97706;
        }

        .status-approved {
            background: #DCFCE7;
            color: #16A34A;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="admin-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="#" class="nav-logo" style="justify-content:center;">
                    <span style="color:var(--primary-orange);">Admin</span>Panel
                </a>
            </div>
            <nav class="sidebar-menu">
                <a href="admin-dash.html" class="sidebar-link">
                    <svg fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                    </svg>
                    <span data-i18n="admin_nav_dash">ภาพรวม (Dashboard)</span>
                </a>
                <a href="admin-users.html" class="sidebar-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                    <span data-i18n="admin_nav_users">จัดการผู้ใช้งาน</span>
                </a>
                <a href="admin-places.html" class="sidebar-link">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span data-i18n="admin_nav_places">จัดการสถานที่</span>
                </a>
                <a href="admin-reviews.html" class="sidebar-link active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                        </path>
                    </svg>
                    <span data-i18n="admin_nav_reviews">ตรวจสอบรีวิว</span>
                </a>
            </nav>
            <div style="padding:var(--spacing-3);">
                <div class="lang-switch mb-3" style="justify-content:center;">
                    <button class="lang-btn active" data-lang="th">TH</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                <a href="login.html" class="btn btn-outline btn-full text-small" data-i18n="admin_logout">ออกจากระบบ</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <div class="flex justify-between items-center mb-4">
                <h1 class="h2" data-i18n="admin_reviews_title">ตรวจสอบรีวิว</h1>

                <div class="flex gap-2">
                    <select class="input-field" style="background:white; padding: 6px 12px;">
                        <option data-i18n="admin_reviews_filter_pending">สถานะ: รอตรวจสอบ</option>
                        <option data-i18n="admin_reviews_filter_approved">สถานะ: อนุมัติแล้ว</option>
                        <option data-i18n="admin_reviews_filter_all">สถานะ: ทั้งหมด</option>
                    </select>
                </div>
            </div>

            <div id="adminReviewsList">
                <!-- Data rendered by JS -->
            </div>

        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
